name: Cloud PC + RustDesk + Opera GX (Legacy ID Extraction)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RUSTDESK_PASS: Pass@1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Download and Force Install RustDesk Client (Legacy Build)
        run: |
          Write-Host "Fetching Legacy unencrypted RustDesk Layout from GitHub Archive..."
          # Fetching version 1.1.9 which preserves raw text config parameters
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.1.9/rustdesk-1.1.9-windows_x64.zip"
          $zipDst = "$env:TEMP\RustDeskLegacy.zip"
          $extractDir = "C:\Program Files\RustDesk"
          
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $zipDst -UserAgent "Mozilla/5.0"
          
          Write-Host "Unpacking and deploying legacy binaries..."
          if (-not (Test-Path $extractDir)) { New-Item -ItemType Directory -Path $extractDir -Force }
          Expand-Archive -Path $zipDst -DestinationPath $extractDir -Force
          
          # Standardize binary layout name inside the destination path
          if (Test-Path "$extractDir\rustdesk-1.1.9.exe") {
              Rename-Item -Path "$extractDir\rustdesk-1.1.9.exe" -NewName "rustdesk.exe" -Force
          }
          
          Write-Host "Registering background system execution threads..."
          $rdExe = "$extractDir\rustdesk.exe"
          Start-Process $rdExe -ArgumentList "--install-service" -Wait
          Start-Sleep -Seconds 10
          Remove-Item $zipDst -ErrorAction SilentlyContinue

      - name: Configure Unattended Security Password & Connection Profile
        run: |
          Write-Host "Injecting security connection keys into the execution instance..."
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          
          if (Test-Path $rdExe) {
              Start-Process -FilePath $rdExe -ArgumentList "--password", "${{ env.RUSTDESK_PASS }}" -Wait
          }
          
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $path -Name "TaskbarGlomLevel" -Value 0 -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

      - name: Minimize Running Infrastructure Windows
        run: |
          Write-Host "Sending active command prompt windows to the taskbar tray..."
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Optimize Resolution for Mobile Display
        run: |
          Write-Host "Forcing resolution calibration matrix..."
          Set-DisplayResolution -Width 1280 -Height 720 -Force -ErrorAction SilentlyContinue

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }
          
          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }
          
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run --enable-features=GXRewards,GXRewardsSidebarItem --with-feature:gx-rewards=1"
          $Shortcut.Save()

      - name: Fetch and Display Legacy RustDesk Connection Credentials
        run: |
          Write-Host "Scanning infrastructure maps for unencrypted plain text RustDesk keys..."
          $deviceId = "Fetching..."
          
          # In 1.1.9, we loop until the network handshake finishes and drops the config string
          for ($i = 1; $i -le 15; $i++) {
              # Check the service profile's unencrypted configuration mapping
              $configPath = "C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\RustDesk\config\RustDesk_local.toml"
              if (Test-Path $configPath) {
                  $content = Get-Content $configPath -Raw
                  if ($content -match 'id\s*=\s*''(\d+)''') {
                      $deviceId = $Matches[1]
                      break
                  }
              }
              
              # Fallback path parsing check
              $altPath = "$env:APPDATA\RustDesk\config\RustDesk_local.toml"
              if (Test-Path $altPath) {
                  $content = Get-Content $altPath -Raw
                  if ($content -match 'id\s*=\s*''(\d+)''') {
                      $deviceId = $Matches[1]
                      break
                  }
              }
              Start-Sleep -Seconds 2
          }
          
          if ($deviceId -eq "Fetching...") { $deviceId = "Not Found (Network Handshake Pending)" }
          
          $ESC = [char]27
          $Green = "$ESC[32m"
          $Yellow = "$ESC[33m"
          $Red = "$ESC[31m"
          $Reset = "$ESC[0m"
          
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Green}      LEGACY RUSTDESK CLOUD PC IS ONLINE            ${Reset}"
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Yellow} RUSTDESK ID     : ${Red}${deviceId}${Reset}"
          Write-Host "${Yellow} ACCESS PASSWORD : ${Red}${{ env.RUSTDESK_PASS }}${Reset}"
          Write-Host "${Green}====================================================${Reset}"

      - name: Keep alive
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }
