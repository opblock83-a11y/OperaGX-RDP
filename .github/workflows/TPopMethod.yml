name: Cloud PC + AweSun Dedicated Server Connection

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes"
        required: false
        default: "355"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    steps:
      - name: Optimize System and Disable Firewall
        run: |
          Write-Host "Prepping environment layers..."
          Set-NetFirewallProfile -Profile Public,Private,Domain -Enabled False
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Download and Silently Install AweSun
        run: |
          Write-Host "Fetching official AweSun deployment package..."
          $url = "https://download.awesun.com/windows/AweSun_Setup.exe"
          $installer = "$env:TEMP\AweSun_Setup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Write-Host "Executing silent structural installation..."
          # Running with flags to bypass interactive setup windows entirely
          Start-Process -FilePath $installer -ArgumentList "/S", "/allusers" -Wait
          Start-Sleep -Seconds 10

      - name: Force Start AweSun Service and Parse Credentials
        run: |
          Write-Host "Waking up AweSun background host engine..."
          $aweSunPath = "${env:ProgramFiles}\AweSun\AweSun.exe"
          if (-not (Test-Path $aweSunPath)) {
              $aweSunPath = "${env:ProgramFiles (x86)}\AweSun\AweSun.exe"
          }
          
          # Initialize the service explicitly
          Start-Process $aweSunPath -ArgumentList "-service" -NoNewWindow
          Start-Sleep -Seconds 15
          
          Write-Host "Extracting connection metrics from configuration layer..."
          $configPath = "$env:AppData\AweSun\config.ini"
          if (-not (Test-Path $configPath)) {
              $configPath = "C:\ProgramData\AweSun\config.ini"
          }
          
          # Reading the configuration to grab your ID and Password automatically
          if (Test-Path $configPath) {
              $config = Get-Content $configPath
              $AweSunID = ($config | Select-String "id=").Line -replace "id=", ""
              $AweSunPw = ($config | Select-String "pwd=").Line -replace "pwd=", ""
              
              # ANSI Escape Sequences for high-visibility terminal highlights
              $Esc = [char]27
              $Cyan = "$Esc[36m"
              $Yellow = "$Esc[33m"
              $Green = "$Esc[32m"
              $Reset = "$Esc[0m"

              Write-Host ""
              Write-Host "${Cyan}###########################################################################${Reset}"
              Write-Host "${Yellow}🚨 DEDICATED AWESUN REMOTE COMPUTER SESSION READY 🚨${Reset}"
              Write-Host "📱 Open the AweSun App on your mobile device or computer to connect."
              Write-Host "###########################################################################${Reset}"
              Write-Host "${Green}🆔 AWESUN DEVICE ID: $AweSunID${Reset}"
              Write-Host "${Green}🔑 PASSCODE / PASSWORD: $AweSunPw${Reset}"
              Write-Host "${Cyan}###########################################################################${Reset}"
              Write-Host ""
          } else {
              Write-Warning "Configuration matrix delayed initialization. Checking process state..."
              Get-Process | Where-Object {$_.Name -like "*AweSun*"}
          }

      - name: Session Keep Alive Loop
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "AweSun Server Stream Active | Heartbeat Signal Live"
            Start-Sleep -Seconds 60
          }
